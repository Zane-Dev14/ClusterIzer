name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:

  quality:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
            version: "latest"
            enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check kubesentinel tools

      - name: Ruff format check
        run: uv run ruff format --check kubesentinel tools

      - name: Type check
        run: uv run mypy kubesentinel

  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
            version: "latest"
            enable-cache: true
        

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest kubesentinel/tests -v

  architecture-tests:
    name: Architecture Tests
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v1
        with:
            version: "latest"
            enable-cache: true

      - run: uv sync --all-extras

      - name: Run architecture validation
        run: |
          uv run pytest kubesentinel/tests/test_architecture.py

  package-build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: architecture-tests

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v1
        with:
            version: "latest"
            enable-cache: true

      - run: uv sync --all-extras

      - name: Build wheel
        run: uv build

      - name: Verify install
        run: |
          pip install dist/*.whl
          kubesentinel --help

  cli-smoke-test:
    name: CLI Smoke Test
    runs-on: ubuntu-latest
    needs: package-build

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v1
        with:
            version: "latest"
            enable-cache: true
      - run: uv sync --all-extras

      - name: Run CLI scan
        run: |
          uv run kubesentinel scan --help